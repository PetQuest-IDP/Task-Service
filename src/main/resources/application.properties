spring.application.name=Task-Service

server.port=8083

# DB Service
db-service.base-url=${DB_SERVICE_BASE_URL:http://db-service:8082}

# JWT (same secret as Auth Service, used only to VALIDATE tokens)
jwt.secret=${JWT_SECRET:256-bit-super-secret-key-for-jwt-petquest-idp}

# RabbitMQ
spring.rabbitmq.host=${RABBITMQ_HOST:rabbitmq}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USER:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}

# Notifications exchange (custom property, used in RabbitConfig)
notifications.exchange=notifications.exchange